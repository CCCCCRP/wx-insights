services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: wxspirder-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: wx
      POSTGRES_PASSWORD: wx
      POSTGRES_DB: wxspirder
    ports:
      - "5432:5432"
    volumes:
      - wxspirder_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wx -d wxspirder"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  wxspirder_pgdata:
