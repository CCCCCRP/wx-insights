# 阿里云 wxspirder 专用 PostgreSQL（与 Halo 博客库分离）
# 部署路径：/opt/wxspirder/docker-compose.yml
# 端口 5433 对外（请配合安全组 IP 白名单 + 强密码）
services:
  postgres:
    image: docker.m.daocloud.io/pgvector/pgvector:pg16
    container_name: wxspirder-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: wx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wx}
      POSTGRES_DB: wxspirder
    ports:
      - "5433:5432"
    volumes:
      - wxspirder_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wx -d wxspirder"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  wxspirder_pgdata:
